# Home Credit Default Risk (Kaggle) — metadatos y rutas
# Relaciones: ver README (diagrama de tablas).

dataset:
  name: home_credit_default_risk
  description: Préstamos; TARGET solo en train.

paths:
  raw: data/raw

files:
  application_train: application_train.csv
  application_test: application_test.csv
  bureau: bureau.csv
  bureau_balance: bureau_balance.csv
  previous_application: previous_application.csv
  pos_cash_balance: POS_CASH_balance.csv
  installments_payments: installments_payments.csv
  credit_card_balance: credit_card_balance.csv
  column_descriptions: HomeCredit_columns_description.csv
  sample_submission: sample_submission.csv

keys:
  sk_id_curr: SK_ID_CURR
  sk_id_bureau: SK_ID_BUREAU
  sk_id_prev: SK_ID_PREV

target: TARGET

evaluation:
  primary_metric: roc_auc
  submission_columns: [SK_ID_CURR, TARGET]
